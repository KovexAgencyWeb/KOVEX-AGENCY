<style>
/* ══════════════════════════════════════════
   VARIABLES Y RESET
══════════════════════════════════════════ */
:root {
  --bg:   #000000;
  --pn:   #0A0A0A;
  --cd:   #1A1A1A;
  --tm:   #7A7A7A;
  --tl:   #C8C8C8;
  --tw:   #FFFFFF;
  --fh:   'Inter', sans-serif;
  --fb:   'DM Sans', sans-serif;
  --bz:   cubic-bezier(0.2, 0.9, 0.4, 1.1);
  --nav-h: 70px;
  --section-hue: 0deg;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--tl);
  font-family: var(--fb);
  overflow-x: hidden;
}
h1, h2, h3, h4 {
  font-family: var(--fh);
  color: var(--tw);
  text-transform: uppercase;
  letter-spacing: -0.02em;
}
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
button { font-family: inherit; cursor: pointer; }
img { max-width: 100%; height: auto; display: block; }

/* ══════════════════════════════════════════
   CURSOR GLOW (radial que sigue al mouse)
══════════════════════════════════════════ */
#cursor-glow {
  position: fixed;
  width: 280px;
  height: 280px;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: -1;
  mix-blend-mode: overlay;
  will-change: transform;
}

/* ══════════════════════════════════════════
   STAR FIELD – TRES CAPAS
══════════════════════════════════════════ */
#star-field {
  position: fixed;
  inset: 0;
  z-index: -3;
  pointer-events: none;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  will-change: transform, opacity;
}
.star-sm { animation: twinkle var(--d,3s) var(--delay,0s) ease-in-out infinite alternate; }
.star-md { animation: twinkle-md var(--d,4s) var(--delay,0s) ease-in-out infinite alternate; }
.star-lg { animation: twinkle-lg var(--d,5s) var(--delay,0s) ease-in-out infinite alternate; }

@keyframes twinkle    { from{opacity:var(--op,.2);transform:scale(1)} to{opacity:calc(var(--op,.2)*2.5);transform:scale(1.3)} }
@keyframes twinkle-md { from{opacity:var(--op,.3);transform:scale(1)} to{opacity:calc(var(--op,.3)*2);transform:scale(1.5)} }
@keyframes twinkle-lg { from{opacity:var(--op,.4);transform:scale(1) blur(0px)} to{opacity:calc(var(--op,.4)*1.8);transform:scale(1.6);filter:blur(1px)} }

/* ══════════════════════════════════════════
   GRID PARALLAX 3D
══════════════════════════════════════════ */
#grid {
  position: fixed;
  inset: -20vh 0;
  width: 100vw;
  height: 140vh;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  z-index: -1;
  pointer-events: none;
  will-change: transform;
  transform-style: preserve-3d;
  transform-origin: center center;
}

/* ══════════════════════════════════════════
   SECTION COLOR OVERLAY
══════════════════════════════════════════ */
#section-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -2;
  transition: background .8s ease;
}

/* ══════════════════════════════════════════
   PARTICLE CANVAS
══════════════════════════════════════════ */
#particle-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9990;
}

/* ══════════════════════════════════════════
   RIPPLE
══════════════════════════════════════════ */
.ripple {
  position: fixed;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transform: scale(0);
  animation: ripple-anim .7s ease-out forwards;
  pointer-events: none;
  z-index: 9998;
}
@keyframes ripple-anim { to { transform: scale(5); opacity: 0; } }

/* ══════════════════════════════════════════
   ENERGY WAVE (botones agregar)
══════════════════════════════════════════ */
.wave-ring {
  position: fixed;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.7);
  pointer-events: none;
  z-index: 9997;
  animation: wave-out .8s ease-out forwards;
  transform: translate(-50%,-50%) scale(0);
}
@keyframes wave-out { to { transform: translate(-50%,-50%) scale(3); opacity: 0; } }

/* ══════════════════════════════════════════
   CONFETTI PARTICLE
══════════════════════════════════════════ */
.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 9996;
  animation: confetti-fall 2s ease-in forwards;
  will-change: transform, opacity;
}
@keyframes confetti-fall {
  to {
    transform: translateY(800px) rotateX(720deg) rotateY(360deg) rotateZ(360deg);
    opacity: 0;
  }
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast-container {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9995;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  pointer-events: none;
}
.toast {
  background: rgba(20,20,20,0.95);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  padding: 12px 24px;
  font-family: var(--fh);
  font-size: .85rem;
  font-weight: 600;
  color: var(--tw);
  letter-spacing: .04em;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  white-space: nowrap;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  animation: toast-in .4s var(--bz) forwards;
}
.toast.out { animation: toast-out .3s ease-in forwards; }
@keyframes toast-in  { from{opacity:0;transform:translateY(20px) scale(.9)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes toast-out { from{opacity:1;transform:translateY(0) scale(1)} to{opacity:0;transform:translateY(-15px) scale(.95)} }

/* ══════════════════════════════════════════
   DATA NOTIFICATION (bottom-left, reemplazo de purchase notif)
══════════════════════════════════════════ */
#data-notif {
  position: fixed;
  bottom: 30px;
  left: 30px;
  z-index: 9994;
  background: rgba(12,12,12,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-left: 3px solid rgba(255,255,255,0.4);
  border-radius: 8px;
  padding: 14px 18px;
  max-width: 280px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
  opacity: 0;
  transform: translateX(-30px);
  transition: opacity .4s, transform .4s var(--bz);
  pointer-events: none;
  font-size: .85rem;
  line-height: 1.5;
  color: var(--tl);
  will-change: opacity, transform;
}
#data-notif.show {
  opacity: 1;
  transform: translateX(0);
}
#data-notif-text {
  will-change: contents;
}

/* ══════════════════════════════════════════
   NAVBAR
══════════════════════════════════════════ */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  z-index: 800;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  transition: background .4s, backdrop-filter .4s, border-bottom .4s;
}
#navbar.scrolled {
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.nav-logo {
  font-family: var(--fh);
  font-weight: 900;
  font-size: 1.3rem;
  color: var(--tw);
  letter-spacing: -0.02em;
  text-transform: uppercase;
}
.nav-logo span { color: var(--tm); }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a {
  font-size: .85rem; font-weight: 500; color: var(--tm);
  text-transform: uppercase; letter-spacing: .08em; transition: color .2s;
}
.nav-links a:hover { color: var(--tw); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; background: var(--tw); color: var(--bg);
  font-family: var(--fh); font-weight: 700; font-size: .8rem;
  text-transform: uppercase; letter-spacing: .06em; border-radius: 4px;
  transition: all .3s var(--bz);
  border: none;
}
.nav-cta:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.25); }

.hamburger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; padding: 5px; z-index: 810;
  cursor: pointer;
}
.hamburger span {
  display: block; width: 24px; height: 2px;
  background: var(--tw); border-radius: 2px; transition: all .3s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

#nav-drawer {
  position: fixed; top: 0; right: -100%;
  width: 100%; max-width: 320px; height: 100vh;
  background: rgba(10,10,10,0.97); backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px); border-left: 1px solid rgba(255,255,255,0.08);
  z-index: 805; display: flex; flex-direction: column;
  padding: 100px 40px 40px; transition: right .4s var(--bz); gap: 30px;
}
#nav-drawer.open { right: 0; }
#nav-drawer a {
  font-family: var(--fh); font-weight: 700; font-size: 1.3rem;
  text-transform: uppercase; color: var(--tm); letter-spacing: -.01em;
  transition: color .2s, transform .2s;
}
#nav-drawer a:hover { color: var(--tw); transform: translateX(8px); }

/* ══════════════════════════════════════════
   SECTION TRANSITIONS – STAGGER
══════════════════════════════════════════ */
section {
  min-height: 100vh;
  padding: calc(var(--nav-h) + 80px) 20px 100px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  position: relative; opacity: 0;
  transform: translateY(40px) scale(0.98);
  transition: opacity .7s var(--bz), transform .7s var(--bz);
  will-change: opacity, transform;
}
section.in  { opacity: 1; transform: translateY(0) scale(1); }
section.out { opacity: 0; transform: translateY(-20px); transition: opacity .4s, transform .4s; }

/* Children stagger on enter */
section.in .stagger-child {
  animation: stagger-reveal var(--sd,.6s) var(--si,0s) var(--bz) both;
}
@keyframes stagger-reveal {
  from { opacity:0; transform: translateY(30px) scale(0.95); filter: blur(8px); }
  to   { opacity:1; transform: translateY(0) scale(1);      filter: blur(0); }
}

.container {
  max-width: 1200px; width: 100%; margin: 0 auto; position: relative; z-index: 2;
}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 16px 32px; background: var(--tw); color: var(--bg);
  font-family: var(--fh); font-weight: 700; font-size: .9rem;
  text-transform: uppercase; letter-spacing: .04em; border-radius: 4px;
  border: none; transition: all .3s var(--bz); position: relative; overflow: hidden;
  will-change: transform;
  cursor: pointer;
}
.btn::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,0,0,0.15), transparent);
  transition: .5s;
}
.btn:hover::before { left: 100%; }
.btn:hover {
  transform: scale(1.04) translateY(-2px);
  box-shadow: 0 0 30px rgba(255,255,255,0.3);
}
.btn-outline {
  background: transparent; color: var(--tw);
  border: 1px solid rgba(255,255,255,0.25);
}
.btn-outline:hover {
  border-color: var(--tw);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}
.hover-card { transition: all .3s var(--bz); will-change: transform; }
.hover-card:hover { transform: scale(1.02) translateY(-6px); box-shadow: 0 20px 50px rgba(255,255,255,0.07); }

/* Vibration on hover */
@keyframes vibrate {
  0%,100%{transform:translateX(0) scale(1.04) translateY(-2px)}
  25%    {transform:translateX(-2px) scale(1.04) translateY(-2px)}
  75%    {transform:translateX(2px) scale(1.04) translateY(-2px)}
}
.btn:hover { animation: vibrate .12s ease-in-out 2; }

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
#hero { text-align: center; perspective: 1000px; }

.hero-badge {
  display: inline-block; padding: 8px 20px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px; font-size: .85rem; margin-bottom: 40px;
  animation: fade-up 1s .3s both, float 5s ease-in-out 1.3s infinite;
  backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); color: var(--tl);
}
@keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.hero-title {
  font-size: clamp(2.8rem, 7vw, 6rem); line-height: 1.05; margin-bottom: 28px;
  background: linear-gradient(to right, #555, #FFF 40%, #FFF 60%, #555);
  background-size: 200% auto; color: transparent;
  -webkit-background-clip: text; background-clip: text;
  opacity: 0; animation: hero-reveal 2.5s var(--bz) .2s forwards;
  transform-style: preserve-3d; transition: transform .1s ease-out;
  will-change: transform;
}
@keyframes hero-reveal {
  0%  {opacity:0;filter:blur(20px);transform:scale(0.88) translateY(40px);background-position:200% center}
  40% {opacity:1}
  100%{opacity:1;filter:blur(0);transform:scale(1) translateY(0);background-position:0% center}
}
#hero p {
  font-size: clamp(1.05rem, 2vw, 1.25rem); max-width: 780px;
  margin: 0 auto 50px; opacity: 0; animation: fade-up 1s 1s both;
  line-height: 1.7; color: var(--tl);
}
.hero-btns {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  opacity: 0; animation: fade-up 1s 1.2s both;
}
.hero-stats {
  display: flex; justify-content: center; gap: 60px; margin-top: 80px;
  opacity: 0; animation: fade-up 1s 1.5s both; flex-wrap: wrap;
}
.hero-stat { text-align: center; }
.hero-stat-n {
  font-family: var(--fh); font-weight: 900; font-size: 2rem;
  color: var(--tw); display: block; line-height: 1; margin-bottom: 6px;
}
.hero-stat-l { font-size: .8rem; color: var(--tm); text-transform: uppercase; letter-spacing: .1em; }

/* ══════════════════════════════════════════
   ABOUT
══════════════════════════════════════════ */
#about { text-align: center; }
.about-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 24px; margin-top: 60px;
}
.about-card {
  background: rgba(10,10,10,0.6); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 36px 28px; text-align: left;
  transition: all .3s var(--bz); transform-style: preserve-3d;
  will-change: border-color, transform, box-shadow;
}
.about-card:hover {
  border-color: rgba(255,255,255,0.15); transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}
.about-card-icon {
  width: 44px; height: 44px; fill: none; stroke: var(--tw);
  stroke-width: 1.5; margin-bottom: 20px;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.2));
}
.about-card h3 { font-size: 1.1rem; margin-bottom: 12px; }
.about-card p  { font-size: .92rem; color: var(--tm); line-height: 1.7; }
.counter-box {
  margin-top: 60px; display: flex; justify-content: center;
  gap: 80px; flex-wrap: wrap;
}
.counter-item { text-align: center; }
.counter-num {
  font-family: var(--fh); font-weight: 900; font-size: 3.5rem; color: var(--tw);
  text-shadow: 0 0 40px rgba(255,255,255,0.2); display: block; line-height: 1;
}
.counter-label {
  font-size: .8rem; color: var(--tm); text-transform: uppercase;
  letter-spacing: .12em; margin-top: 8px;
}

/* ══════════════════════════════════════════
   PAIN POINTS
══════════════════════════════════════════ */
#pain { padding-bottom: 80px; }
.pain-intro { text-align: center; margin-bottom: 70px; }
.pain-intro p { max-width: 600px; margin: 20px auto 0; color: var(--tm); font-size: 1.05rem; line-height: 1.6; }
.pain-item {
  font-size: clamp(1.1rem, 2.2vw, 1.8rem); font-family: var(--fh); color: var(--tm);
  margin-bottom: 28px; opacity: 0; transform: translateY(20px);
  transition: all .4s ease; display: flex; align-items: center; gap: 18px;
  cursor: pointer; padding: 20px 24px; border-radius: 8px; border: 1px solid transparent;
  will-change: color, background, border-color, transform, text-shadow;
}
.pain-item.visible { opacity: 1; transform: translateY(0); }
.pain-item:hover {
  color: var(--tw); background: rgba(255,255,255,0.03);
  border-color: rgba(255,255,255,0.08); transform: translateX(12px);
  text-shadow: 0 0 20px rgba(255,255,255,0.15);
}
.pain-arrow {
  opacity: 0; width: 0; transition: all .4s var(--bz); flex-shrink: 0;
  stroke: var(--tw); fill: none; filter: drop-shadow(0 0 5px #fff);
}
.pain-item:hover .pain-arrow { opacity: 1; width: 30px; }

/* ══════════════════════════════════════════
   MÉTODO SCALE
══════════════════════════════════════════ */
#scale { text-align: center; }
.scale-subtitle { margin-top: 12px; color: var(--tm); font-size: 1.05rem; }
.scale-track {
  position: relative; display: flex; justify-content: space-between; align-items: center;
  max-width: 820px; margin: 70px auto 0; padding: 20px 0;
}
.scale-line {
  position: absolute; top: 50%; left: 5%; right: 5%;
  height: 1px; background: rgba(255,255,255,0.1); z-index: 1;
}
.scale-dot {
  position: absolute; top: 50%; left: 5%; width: 10px; height: 10px;
  background: var(--tw); border-radius: 50%; transform: translateY(-50%);
  box-shadow: 0 0 20px 8px rgba(255,255,255,0.4); z-index: 2;
  opacity: 0; transition: left .5s var(--bz), opacity .3s;
  will-change: left;
}
.scale-letter {
  font-size: 2rem; font-family: var(--fh); font-weight: 900; color: var(--tm);
  background: var(--bg); width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); z-index: 3;
  cursor: pointer; transition: all .3s var(--bz), transform .2s; position: relative;
  transform-style: preserve-3d;
  will-change: color, border-color, transform, box-shadow;
}
.scale-letter:hover {
  color: var(--tw); border-color: rgba(255,255,255,0.5);
  transform: scale(1.15) rotateX(15deg) rotateY(10deg);
  box-shadow: 0 0 30px rgba(255,255,255,0.12);
}
.scale-letter.active {
  color: var(--tw); border-color: rgba(255,255,255,0.5);
  transform: scale(1.15); box-shadow: 0 0 30px rgba(255,255,255,0.12);
}
.scale-letter svg.rocket-icon { display:none; width:38px; height:38px; filter:drop-shadow(0 0 12px #fff); }
.scale-letter.launching {
  animation: rocket-launch 1.5s cubic-bezier(0.5,0,0.2,1) forwards;
  border-color: transparent; color: transparent; pointer-events: none; z-index: 50;
  will-change: transform;
}
.scale-letter.launching span { display: none; }
.scale-letter.launching svg.rocket-icon { display: block; animation: rocket-pulse .2s infinite alternate; }
@keyframes rocket-pulse { from{filter:drop-shadow(0 0 10px #fff)} to{filter:drop-shadow(0 0 25px #fff)} }
@keyframes rocket-launch {
  0%  {transform:translateY(0) scale(1);opacity:1}
  20% {transform:translateY(12px) scale(0.9);opacity:1}
  100%{transform:translateY(-700px) scale(1.4);opacity:0}
}
.rocket-flash {
  position: fixed; inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, transparent 60%);
  z-index: 19; pointer-events: none;
  animation: flash-out .6s ease-out forwards;
}
@keyframes flash-out {
  0%  {opacity:0;transform:scale(0.3)}
  40% {opacity:1;transform:scale(1.1)}
  100%{opacity:0;transform:scale(2)}
}
/* Rocket trail particles */
.rocket-trail {
  position: fixed; width: 6px; height: 6px; border-radius: 50%;
  background: #fff; pointer-events: none; z-index: 18;
  animation: trail-fade .6s ease-out forwards;
  will-change: transform, opacity;
}
@keyframes trail-fade { to{opacity:0;transform:scale(0)} }

.scale-display {
  max-width: 820px; margin: 30px auto 0; min-height: 130px;
  background: rgba(10,10,10,0.7); padding: 32px 36px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06); font-size: 1.05rem; line-height: 1.7;
  text-align: left; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.scale-display-inner { animation: slide-in .4s var(--bz) forwards; }
.scale-display-inner.vibrate { animation: text-vibrate .2s ease-in-out; }
@keyframes slide-in { from{opacity:0;transform:translateX(-25px)} to{opacity:1;transform:translateX(0)} }
@keyframes text-vibrate {
  0%,100%{transform:translateX(0)}
  25%    {transform:translateX(-2px)}
  75%    {transform:translateX(2px)}
}

/* ══════════════════════════════════════════
   RESULTADOS REALES
══════════════════════════════════════════ */
#results { text-align: center; }
.results-intro {
  max-width: 700px; margin: 20px auto 0; color: var(--tm);
  font-size: 1.05rem; line-height: 1.6;
}
.results-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 28px; margin-top: 60px; width: 100%; text-align: left;
}
.result-card {
  background: rgba(10,10,10,0.7); backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px); padding: 36px 30px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden;
  transition: all .3s var(--bz);
  will-change: border-color, transform, box-shadow;
}
.result-card::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  transform: skewX(-20deg); transition: .8s;
  will-change: left;
}
.result-card:hover::before { left: 200%; }
.result-card:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 60px rgba(255,255,255,0.06); transform: translateY(-6px); }
.result-tag {
  display: inline-block; padding: 4px 14px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px; font-size: .75rem; color: var(--tl);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 18px; font-family: var(--fh);
}
.result-card-icon {
  width: 42px; height: 42px; fill: none; stroke: var(--tw); stroke-width: 1.5;
  margin-bottom: 18px; filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
}
.result-card h3 { font-size: 1.3rem; margin-bottom: 14px; }
.result-card p  { font-size: .92rem; color: var(--tm); line-height: 1.75; margin-bottom: 24px; }
.result-metrics {
  display: flex; gap: 20px; flex-wrap: wrap;
  padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06);
}
.result-metric { text-align: left; }
.result-metric-n {
  font-family: var(--fh); font-weight: 800; font-size: 1.4rem; color: var(--tw);
  display: block; line-height: 1; margin-bottom: 4px;
  will-change: contents;
}
.result-metric-l { font-size: .75rem; color: var(--tm); text-transform: uppercase; letter-spacing: .08em; }
.result-chart { width: 100%; height: 70px; margin-top: 20px; overflow: visible; }
.chart-path {
  fill: none; stroke: var(--tw); stroke-width: 2.5;
  stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 400; stroke-dashoffset: 400;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.5));
  transition: stroke-dashoffset 1.2s var(--bz);
  will-change: stroke-dashoffset;
}
/* Draw on scroll + hover */
.chart-path.drawn { stroke-dashoffset: 0; }
.result-card:hover .chart-path { stroke-dashoffset: 0; }

/* ══════════════════════════════════════════
   DIAGNÓSTICO (6 PREGUNTAS)
══════════════════════════════════════════ */
#survey { padding-top: 100px; }
.survey-box {
  background: var(--pn); padding: 60px 55px; border-radius: 16px;
  max-width: 820px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}
.survey-header { margin-bottom: 10px; }
.survey-header p { color: var(--tm); font-size: 1.05rem; margin-top: 12px; line-height: 1.6; }
.progress-wrap { margin: 32px 0 36px; }
.progress-track {
  height: 4px; background: var(--cd); border-radius: 2px; overflow: hidden;
}
.progress-bar {
  height: 100%; background: var(--tw); width: 0%;
  transition: width .5s var(--bz); box-shadow: 0 0 8px rgba(255,255,255,0.5);
  will-change: width;
}
.progress-label { font-size: .8rem; color: var(--tm); margin-top: 10px; font-family: var(--fh); }
.question-block { display: none; }
.question-block.active { display: block; animation: slide-in .4s var(--bz); }
.question-block h3 {
  font-size: 1.2rem; line-height: 1.4; margin-bottom: 28px; font-weight: 600;
  text-transform: none; letter-spacing: 0;
}
.options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.option-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.12);
  color: var(--tw); padding: 16px 22px; border-radius: 8px; text-align: left;
  font-size: 1rem; transition: all .2s; display: flex;
  justify-content: space-between; align-items: center; line-height: 1.4;
  cursor: pointer;
  will-change: border-color, background, transform;
}
.option-btn:hover {
  border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.04);
  transform: translateX(5px);
}
.option-btn.selected {
  background: rgba(255,255,255,0.12); border-color: var(--tw);
  box-shadow: 0 0 15px rgba(255,255,255,0.08);
}
.check-icon {
  opacity: 0; transform: scale(0); transition: all .3s var(--bz);
  width: 20px; height: 20px; flex-shrink: 0; fill: none; stroke: var(--tw);
  stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
}
.option-btn.selected .check-icon { opacity: 1; transform: scale(1); }
.survey-actions { margin-top: 36px; text-align: right; }
#diag-result {
  display: none; margin-top: 36px; padding: 36px;
  border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent);
}
.diag-result-reveal { animation: bounce-in .7s var(--bz) forwards; }
@keyframes bounce-in {
  0%  {opacity:0;transform:translateY(40px) scale(0.9)}
  60% {opacity:1;transform:translateY(-8px) scale(1.01)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.diag-profile {
  display: inline-block; padding: 5px 16px;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
  font-size: .8rem; font-family: var(--fh); font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 20px; color: var(--tl);
}
#diag-result h3 {
  font-size: 1.4rem; margin-bottom: 16px; text-shadow: 0 0 20px rgba(255,255,255,0.2);
  text-transform: none; letter-spacing: -.01em;
}
#diag-text { line-height: 1.85; font-size: 1.02rem; color: var(--tl); margin-bottom: 30px; }
.diag-actions { display: flex; gap: 14px; flex-wrap: wrap; }

/* Btn diagnóstico flash */
@keyframes btn-flash {
  0%,100%{box-shadow:0 0 0 rgba(255,255,255,0)}
  50%    {box-shadow:0 0 40px rgba(255,255,255,0.6)}
}
.btn-flash { animation: btn-flash .4s ease-in-out 2; }

/* ══════════════════════════════════════════
   PAQUETES
══════════════════════════════════════════ */
#packages { text-align: center; }
.packages-intro {
  max-width: 680px; margin: 20px auto 0; color: var(--tm);
  font-size: 1.05rem; line-height: 1.6;
}
.packages-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px; margin-top: 60px; width: 100%; text-align: left;
}
.package-card {
  background: var(--pn); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 36px 28px;
  display: flex; flex-direction: column;
  transition: all .3s var(--bz); position: relative; overflow: hidden;
  will-change: border-color, transform, box-shadow;
  transform-style: preserve-3d;
  perspective: 1000px;
}
.package-card.featured { border-color: rgba(255,255,255,0.25); background: rgba(20,20,20,0.9); }
.package-card.featured::before {
  content: 'MÁS POPULAR'; position: absolute; top: 16px; right: -28px;
  background: var(--tw); color: var(--bg); font-family: var(--fh);
  font-size: .65rem; font-weight: 800; letter-spacing: .1em;
  padding: 5px 40px; transform: rotate(45deg);
}
.package-card:hover {
  border-color: rgba(255,255,255,0.2); transform: translateY(-10px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

/* Viewers badge */
.pkg-viewers {
  font-size: .75rem; color: var(--tm); margin-bottom: 10px;
  display: flex; align-items: center; gap: 5px;
  will-change: contents;
}
.pkg-viewers .fire { color: #ff6b2b; }

/* Stock badge */
.pkg-stock {
  margin-bottom: 14px;
}
.stock-bar-wrap {
  height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
  margin-top: 5px;
}
.stock-bar {
  height: 100%; background: linear-gradient(90deg, #ff4444, #ff8844);
  border-radius: 2px; transition: width 1s;
  will-change: width;
}
.stock-label { font-size: .72rem; color: #ff6b2b; font-family: var(--fh); font-weight: 600; letter-spacing: .04em; }

/* Countdown timer */
.pkg-countdown {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px; padding: 8px 12px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px; font-size: .78rem;
}
.pkg-countdown .cd-label { color: var(--tm); }
.pkg-countdown .cd-timer { font-family: var(--fh); font-weight: 700; color: var(--tw); letter-spacing: .04em; will-change: contents; }

.package-name { font-size: 1.1rem; letter-spacing: -.01em; margin-bottom: 6px; }
.package-price {
  font-size: 2rem; font-family: var(--fh); font-weight: 800; color: var(--tw);
  margin: 14px 0 4px; text-shadow: 0 0 20px rgba(255,255,255,0.15);
  position: relative; cursor: help;
}
.package-price::after {
  content: attr(data-tooltip);
  position: absolute; bottom: -45px; left: 0; right: 0;
  background: rgba(20,20,20,0.95); color: var(--tl);
  padding: 8px 12px; border-radius: 6px; font-size: .75rem;
  white-space: normal; opacity: 0; pointer-events: none;
  transform: translateY(-10px); transition: opacity .3s, transform .3s;
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
  width: 200px;
}
.package-card:hover .package-price::after {
  opacity: 1;
  transform: translateY(0);
}

.package-reach { font-size: .82rem; color: var(--tm); margin-bottom: 8px; }
.package-roi {
  font-size: .85rem; color: var(--tl); padding: 10px 14px;
  background: rgba(255,255,255,0.04); border-left: 2px solid rgba(255,255,255,0.2);
  border-radius: 0 4px 4px 0; margin-bottom: 24px; line-height: 1.5;
}
.package-features { flex-grow: 1; margin-bottom: 28px; }
.package-features li {
  margin-bottom: 12px; color: var(--tm); display: flex;
  align-items: flex-start; gap: 10px; font-size: .9rem; line-height: 1.5;
}
.package-features li::before { content: '→'; color: var(--tw); font-weight: 700; flex-shrink: 0; }
.package-more {
  display: none; margin-top: 16px; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: .88rem; color: var(--tl); line-height: 1.65;
  animation: slide-in .3s ease;
}
.package-btns { display: flex; gap: 10px; }
.package-btns .btn {
  flex: 1; padding: 13px 20px; font-size: .82rem;
  transition: all .3s var(--bz);
  will-change: transform;
}
.package-btns .btn:active {
  animation: btn-pulse .2s ease-out;
}
@keyframes btn-pulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(0.95); }
  100% { transform: scale(1.05); }
}

/* ══════════════════════════════════════════
   FAQ
══════════════════════════════════════════ */
#faq { text-align: center; }
.faq-list { max-width: 820px; margin: 60px auto 0; width: 100%; text-align: left; }
.faq-item { border-bottom: 1px solid rgba(255,255,255,0.08); }
.faq-question {
  width: 100%; text-align: left; background: none; border: none; color: var(--tw);
  font-family: var(--fh); font-size: 1.1rem; padding: 28px 0;
  display: flex; justify-content: space-between; align-items: center;
  gap: 20px; transition: all .3s; letter-spacing: -.01em; text-transform: none;
  cursor: pointer;
  will-change: color, text-shadow, transform;
}
.faq-question:hover { color: var(--tw); text-shadow: 0 0 15px rgba(255,255,255,0.3); transform: translateX(6px); }
.faq-icon {
  transition: transform .5s var(--bz); width: 22px; height: 22px;
  flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2;
  will-change: transform;
}
.faq-item.active .faq-icon { transform: rotate(180deg); filter: drop-shadow(0 0 5px #fff); }
.faq-answer-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .5s var(--bz); }
.faq-item.active .faq-answer-wrap { grid-template-rows: 1fr; }
.faq-answer { overflow: hidden; }
.faq-answer-inner {
  padding-bottom: 28px; color: var(--tm); line-height: 1.8; font-size: 1rem;
  opacity: 0; transform: scaleY(0.8); transform-origin: top;
  transition: all .5s var(--bz);
}
.faq-item.active .faq-answer-inner { transform: scaleY(1); opacity: 1; }
.faq-answer-inner strong { color: var(--tl); font-weight: 600; }

/* ══════════════════════════════════════════
   CTA FINAL
══════════════════════════════════════════ */
#cta { text-align: center; }
#cta h2 { font-size: clamp(2.5rem, 5.5vw, 4.8rem); line-height: 1.05; margin-bottom: 28px; text-shadow: 0 0 40px rgba(255,255,255,0.15); }
#cta .cta-sub { font-size: 1.2rem; color: var(--tm); max-width: 680px; margin: 0 auto 50px; line-height: 1.65; }
.cta-guarantee {
  margin-top: 28px; font-size: .9rem; color: var(--tm);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.cta-guarantee::before { content: '✓'; color: var(--tl); font-weight: 700; }

/* ══════════════════════════════════════════
   CARRITO
══════════════════════════════════════════ */
#cart {
  position: fixed; top: 0; right: -520px; width: 100%; max-width: 520px;
  height: 100vh; background: rgba(8,8,8,0.97); backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px); border-left: 1px solid rgba(255,255,255,0.08);
  z-index: 1000; padding: 40px; display: flex; flex-direction: column;
  transition: right .5s var(--bz); box-shadow: -30px 0 80px rgba(0,0,0,0.8);
  will-change: right;
}
#cart.open { right: 0; }
.cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; }
.cart-close { background: none; border: none; color: var(--tw); font-size: 2.2rem; line-height: 1; transition: transform .3s; cursor: pointer; will-change: transform; }
.cart-close:hover { transform: rotate(90deg) scale(1.2); }
.cart-items { flex-grow: 1; overflow-y: auto; padding-right: 8px; }
.cart-items::-webkit-scrollbar { width: 4px; }
.cart-items::-webkit-scrollbar-thumb { background: var(--cd); border-radius: 2px; }
.cart-item {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  animation: slide-in .3s ease;
}
.cart-item-name { font-size: 1rem; font-weight: 500; margin-bottom: 4px; }
.cart-item-price { color: var(--tm); font-size: .9rem; }
.cart-remove {
  background: none; border: none; color: #e05555; font-size: .82rem;
  text-decoration: underline; transition: color .2s; cursor: pointer; padding: 0;
  white-space: nowrap; margin-left: 16px; flex-shrink: 0;
}
.cart-remove:hover { color: #ff3333; }
.cart-footer { margin-top: 20px; padding-top: 28px; border-top: 1px solid rgba(255,255,255,0.08); }
.cart-discount-label {
  display: flex; gap: 12px; align-items: center; margin-bottom: 24px;
  font-size: 1rem; cursor: pointer;
}
.cart-discount-label input { width: 20px; height: 20px; accent-color: var(--tw); cursor: pointer; flex-shrink: 0; }
.cart-total { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
.cart-total-label { font-size: 1rem; color: var(--tm); }
.cart-total-value { font-family: var(--fh); font-weight: 800; font-size: 1.9rem; color: var(--tw); }
.cart-total-original { font-size: .85rem; color: var(--tm); text-decoration: line-through; margin-left: 8px; }
.cart-empty { text-align: center; color: var(--tm); padding: 60px 20px; }
.cart-empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }

/* ══════════════════════════════════════════
   STICKY CART BTN
══════════════════════════════════════════ */
#sticky-cart {
  position: fixed; bottom: 30px; right: 30px; z-index: 900;
  opacity: 0; transform: translateY(20px); transition: all .5s var(--bz);
  pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  border: 1px solid rgba(255,255,255,0.15);
  will-change: opacity, transform;
}
#sticky-cart.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

/* ══════════════════════════════════════════
   MODAL (Legal)
══════════════════════════════════════════ */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000;
  display: none; align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
#modal-overlay.open { display: flex; }
.modal-box {
  background: var(--pn); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
  padding: 48px 44px; max-width: 740px; width: 100%; max-height: 85vh;
  overflow-y: auto; position: relative; animation: modal-in .4s var(--bz);
}
@keyframes modal-in { from{opacity:0;transform:scale(0.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-close {
  position: absolute; top: 20px; right: 20px; background: none; border: none;
  color: var(--tw); font-size: 1.8rem; line-height: 1; transition: transform .3s; cursor: pointer; will-change: transform;
}
.modal-close:hover { transform: rotate(90deg); }
.modal-box h2 { font-size: 1.5rem; margin-bottom: 28px; text-transform: none; letter-spacing: -.01em; }
.modal-box p, .modal-box li { color: var(--tm); line-height: 1.8; font-size: .95rem; margin-bottom: 16px; }
.modal-box h3 { font-size: 1rem; margin: 28px 0 10px; text-transform: none; }
.modal-box ul { padding-left: 20px; }
.modal-box ul li { list-style: disc; }

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
footer {
  padding: 80px 20px 50px; text-align: center;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: .88rem; color: var(--tm);
}
footer .footer-brand {
  font-family: var(--fh); font-weight: 900; font-size: 1.4rem; color: var(--tw);
  text-transform: uppercase; letter-spacing: -.02em; margin-bottom: 8px;
}
footer .footer-tagline { color: var(--tm); margin-bottom: 32px; font-size: .9rem; }
